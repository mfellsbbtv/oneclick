version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: oneclick-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oneclick}
      POSTGRES_USER: ${POSTGRES_USER:-oneclick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - oneclick-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneclick -d oneclick"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oneclick-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - oneclick-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oneclick-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-oneclick}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-oneclick}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      PORT: 3001
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    networks:
      - oneclick-network
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oneclick-frontend
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set in .env}
      SCHEDULER_API_URL: http://scheduler:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - oneclick-network
    command: npm run dev

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: oneclick-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-oneclick}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB:-oneclick}
      PROVISIONING_API_URL: http://frontend:3000/api/provision-n8n
      TERMINATION_API_URL: http://frontend:3000/api/terminate-n8n
      SCHEDULER_INTERVAL: "*/1 * * * *"
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - oneclick-network
    restart: unless-stopped

networks:
  oneclick-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: